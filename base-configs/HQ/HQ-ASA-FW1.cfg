ftp mode passive
clock timezone AWST 8
dns server-group DefaultDNS
 domain-name example.com
pager lines 23
mtu OUTSIDE-1 1500
mtu OUTSIDE-2 1500
mtu DMZ-MGMT-LAN 1500
mtu DMZ-SRVS-LAN 1500
mtu DMZ-DMVPN-LAN-11 1500
